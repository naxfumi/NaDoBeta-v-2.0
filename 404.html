<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <style type="text/css" media="all">
    body {
      font-family: "Poppins", sans-serif;
      height: 90vh;
      background: #196042;
    }
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      
      height: 99vh;
      color: #FFFFFF8A;
    }
    
    .message {
      width: 300px;
      font-size: 1.5em;
      display: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 45px;
      background: #44444433;
      border-radius: 30px;
      box-shadow: 30px 10px 61px 0px rgba(0, 0, 0, 0.43);

      -webkit-box-shadow: 30px 10px 61px 0px rgba(0,0,0,0.75);
      -moz-box-shadow: 30px 10px 61px 0px rgba(0,0,0,0.75);
      
background: linear-gradient(170deg, rgba(255, 255, 255, 0.16) 0%, rgba(0, 0, 0, 0.23) 100%);
      
    }
    .message::before {}
    .message h1 {
      font-weight: 900;
      font-style: bold;
    }
    
    span {
      font-size: 15px;
      font-weight: 500;
    }
    a {

      color: #FFFFFF8a;
      font-size: 13px;
      font-weight: 300;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="message">
      <h1>404</h1><h4>Not Found</h4>
      <span>Halaman tidak ditemukan</span><br>
      <span><a href="https://instagram.com/@nzrl_af">@naxfumi</a></span>
    </div>
  </div>
</body>

</html>
