<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NaDomped — Masuk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   TOKENS — sama persis dengan app utama
═══════════════════════════════════════════ */
:root {
  --accent: #0A84FF;
  --green:  #30D158;
  --bg:     #000000;
  --bg2:    #1C1C1E;
  --surface:#161618;
  --surface-hover: #1F1F22;
  --text:   #F5F5F7;
  --text2:  #98989D;
  --text3:  #636366;
  --border: #2C2C2E;
  --sep:    #232325;
}
[data-theme="light"] {
  --bg:     #F2F2F7;
  --bg2:    #FFFFFF;
  --surface:#FFFFFF;
  --surface-hover: #EFEFF4;
  --text:   #1C1C1E;
  --text2:  #6E6E73;
  --text3:  #AEAEB2;
  --border: #E2E2E6;
  --sep:    #E5E5EA;
}

/* ═══════════════════════════════════════════
   RESET
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  letter-spacing: -0.01em;
}

/* ═══════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════ */
.shell {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
}

/* Subtle grid texture — signature element.
   A faint dot-grid on the background gives the page
   structure and depth without relying on blur or glow.
   Disappears into the background so it never competes. */
.shell::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, var(--border) 1px, transparent 1px);
  background-size: 28px 28px;
  opacity: 0.5;
  pointer-events: none;
  z-index: 0;
}

/* ═══════════════════════════════════════════
   CARD
═══════════════════════════════════════════ */
.card {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 380px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 40px 36px 36px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* ═══════════════════════════════════════════
   LOGO MARK
═══════════════════════════════════════════ */
.logomark {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 22px;
  flex-shrink: 0;
}
.logomark svg {
  width: 28px;
  height: 28px;
  color: #fff;
}

/* ═══════════════════════════════════════════
   BRAND COPY
═══════════════════════════════════════════ */
.brand-name {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.03em;
  color: var(--text);
  margin-bottom: 6px;
  text-align: center;
}

.brand-sub {
  font-size: 14px;
  color: var(--text2);
  font-weight: 400;
  text-align: center;
  line-height: 1.5;
  margin-bottom: 36px;
  max-width: 260px;
}

/* ═══════════════════════════════════════════
   DIVIDER
═══════════════════════════════════════════ */
.divider {
  width: 100%;
  height: 1px;
  background: var(--sep);
  margin-bottom: 28px;
}

/* ═══════════════════════════════════════════
   GOOGLE BUTTON — the only CTA
═══════════════════════════════════════════ */
.btn-google {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 14px 20px;
  border-radius: 13px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.01em;
  cursor: pointer;
  transition: background 0.15s;
  margin-bottom: 28px;
}
.btn-google:hover { background: var(--surface-hover); }
.btn-google:active { opacity: 0.85; }

/* Google SVG logo — official colors */
.google-logo {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════
   FINE PRINT
═══════════════════════════════════════════ */
.fine-print {
  font-size: 11.5px;
  color: var(--text3);
  text-align: center;
  line-height: 1.6;
}
.fine-print a {
  color: var(--text2);
  text-decoration: underline;
  text-underline-offset: 2px;
}
.fine-print a:hover { color: var(--text); }

/* ═══════════════════════════════════════════
   THEME TOGGLE — top right, minimal
═══════════════════════════════════════════ */
.theme-btn {
  position: fixed;
  top: 18px;
  right: 18px;
  z-index: 10;
  width: 36px;
  height: 36px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.theme-btn:hover { background: var(--surface-hover); color: var(--text); }
.theme-btn svg { width: 16px; height: 16px; }

/* ═══════════════════════════════════════════
   FOOTER — bottom of screen
═══════════════════════════════════════════ */
.page-footer {
  position: fixed;
  bottom: 20px;
  left: 0; right: 0;
  text-align: center;
  font-size: 11px;
  color: var(--text3);
  z-index: 1;
  letter-spacing: 0.01em;
}

/* ═══════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════ */
@media (max-width: 420px) {
  .card { padding: 32px 24px 28px; border-radius: 18px; }
  .brand-name { font-size: 20px; }
}

@media (min-width: 769px) {
  /* Desktop: card sits centered with a bit more breathing room */
  .card { max-width: 400px; padding: 48px 44px 40px; }
}
</style>
</head>
<body>

<!-- THEME TOGGLE -->
<button class="theme-btn" onclick="toggleTheme()" id="themeBtn" aria-label="Toggle tema">
  <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </svg>
</button>

<div class="shell">
  <div class="card">

    <!-- Logo mark -->
    <div class="logomark" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="6" width="20" height="14" rx="2"/>
        <path d="M2 10h20"/>
        <path d="M6 14h4"/>
      </svg>
    </div>

    <!-- Brand -->
    <div class="brand-name">NaDomped</div>
    <div class="brand-sub">Catat keuanganmu dengan mudah, fleksibel,<br>kapan saja dan di mana saja.</div>

    <div class="divider"></div>

    <!-- Google Auth Button -->
    <button class="btn-google" onclick="handleGoogleLogin()" id="googleBtn">
      <!-- Official Google logo SVG -->
      <svg class="google-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Lanjut dengan Google
    </button>

    <!-- Fine print -->
    <p class="fine-print">
      Dengan masuk, kamu menyetujui<br>
      <a href="https://policies.google.com/terms?hl=id-ID">Ketentuan Layanan</a> dan <a href="https://policies.google.com/privacy?hl=id-ID">Kebijakan Privasi</a> kami.
    </p>

  </div>
</div>

<!-- Footer -->
<div class="page-footer">NaDomped &copy; 2025</div>

<script type="module">

// ── FIREBASE SDK ─────────────────────────────────
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ── FIREBASE CONFIG ──────────────────────────────
// Ganti seluruh objek ini dengan config dari Firebase Console kamu
const firebaseConfig = {
  apiKey: "AIzaSyDEqRjayX6uok6UIDka1Py7lMhURpvGaMw",
  authDomain: "nadomped.firebaseapp.com",
  projectId: "nadomped",
  storageBucket: "nadomped.firebasestorage.app",
  messagingSenderId: "813627030723",
  appId: "1:813627030723:web:fcf98b72570331a981f676",
  measurementId: "G-NEPG2RCJ8R"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// ── REDIRECT TARGET ──────────────────────────────
const APP_PAGE = 'index.html';

// ── THEME ─────────────────────────────────────────
const SUN = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>';
const MOON = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';

let isDark = localStorage.getItem('dk_theme') !== 'light';

function applyTheme() {
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('themeIcon').innerHTML = isDark ? MOON : SUN;
  localStorage.setItem('dk_theme', isDark ? 'dark' : 'light');
}

window.toggleTheme = function () {
  isDark = !isDark;
  applyTheme();
};

applyTheme();

// ── GOOGLE LOGIN ──────────────────────────────────
const googleBtn = document.getElementById('googleBtn');
const originalBtnHTML = googleBtn.innerHTML;

function setBtnLoading(isLoading) {
  googleBtn.disabled = isLoading;
  googleBtn.innerHTML = isLoading ? 'Menghubungkan...' : originalBtnHTML;
}

window.handleGoogleLogin = async function () {
  setBtnLoading(true);
  try {
    await signInWithPopup(auth, provider);
    // onAuthStateChanged di bawah akan handle redirect otomatis
  } catch (err) {
    console.error('Login gagal:', err.code, err.message);
    setBtnLoading(false);

    if (err.code === 'auth/popup-closed-by-user') {
      // User batal login sendiri, tidak perlu alert
      return;
    }
    alert('Gagal masuk. Silakan coba lagi.');
  }
};

// ── AUTO-REDIRECT KALAU SUDAH LOGIN ──────────────
onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = APP_PAGE;
  }
});

</script>
</body>
</html>
